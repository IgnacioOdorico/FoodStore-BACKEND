version: '3.8'

services:
  db:
    image: postgres:15
    container_name: tp3_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1941
      POSTGRES_DB: seguridad_jwt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
